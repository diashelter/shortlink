services:
  tls-init:
    image: alpine/openssl:3.3.3
    volumes:
      - shortlink_tls_certs:/certs
      - ./docker/nginx/generate-certs.sh:/scripts/generate-certs.sh:ro
    entrypoint: ["/bin/sh", "/scripts/generate-certs.sh"]
    restart: "no"

  nginx:
    image: nginx:1.27.3-alpine
    depends_on:
      tls-init:
        condition: service_completed_successfully
      api:
        condition: service_healthy
    environment:
      TLS_HOST_PORT: ${TLS_HOST_PORT:-8443}
      API_CONTAINER_PORT: ${API_CONTAINER_PORT:-3000}
    ports:
      - "${API_HOST_PORT:-3000}:80"
      - "${TLS_HOST_PORT:-8443}:443"
    volumes:
      - shortlink_tls_certs:/etc/nginx/certs:ro
      - ./docker/nginx/templates:/etc/nginx/templates:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider -S http://127.0.0.1/ 2>&1 | grep -q 'HTTP/1.1 301'",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:dev
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_CONTAINER_PORT:-3000}
      API_CONTAINER_PORT: ${API_CONTAINER_PORT:-3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-jwt-access-secret-dev-only}
      AUTH_HMAC_SECRET: ${AUTH_HMAC_SECRET:-change-me-auth-hmac-secret-dev-only}
      AUTH_TOKEN_HASH_SECRET: ${AUTH_TOKEN_HASH_SECRET:-change-me-auth-token-hash-secret-dev-only}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost:8443}
      FRONTEND_RESET_URL: ${FRONTEND_RESET_URL:-https://localhost:8443/reset-password}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-shortlink_refresh}
      POSTGRES_DB: ${POSTGRES_DB:-shortlink}
      POSTGRES_USER: ${POSTGRES_USER:-shortlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortlink_dev_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MAILPIT_HOST: ${MAILPIT_HOST:-mailpit}
      MAILPIT_SMTP_PORT: ${MAILPIT_SMTP_PORT:-1025}
      MAIL_FROM: ${MAIL_FROM:-noreply@shortlink.local}
      EMAIL_QUEUE_ATTEMPTS: ${EMAIL_QUEUE_ATTEMPTS:-5}
      EMAIL_QUEUE_BACKOFF_MS: ${EMAIL_QUEUE_BACKOFF_MS:-2000}
      LINK_STATS_PSEUDONYM_SECRET: ${LINK_STATS_PSEUDONYM_SECRET:-change-me-link-stats-pseudonym-secret-dev-only}
      LINK_STATS_QUEUE_ATTEMPTS: ${LINK_STATS_QUEUE_ATTEMPTS:-5}
      LINK_STATS_QUEUE_BACKOFF_MS: ${LINK_STATS_QUEUE_BACKOFF_MS:-2000}
      GEOIP_COUNTRY_DB_PATH: ${GEOIP_COUNTRY_DB_PATH:-}
      PUBLIC_SHORT_URL_BASE: ${PUBLIC_SHORT_URL_BASE:-https://localhost:8443}
      LINK_CODE_GENERATION_MAX_ATTEMPTS: ${LINK_CODE_GENERATION_MAX_ATTEMPTS:-5}
      LINK_RESOLUTION_CACHE_TTL_SECONDS: ${LINK_RESOLUTION_CACHE_TTL_SECONDS:-300}
    volumes:
      - .:/app
      - /app/node_modules
      - shortlink_tls_certs:/certs:ro
      - ./data/geoip:/data/geoip:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:' + (process.env.PORT || 3000) + '/', (res) => process.exit(res.statusCode >= 200 && res.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  postgres:
    image: postgres:16.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shortlink}
      POSTGRES_USER: ${POSTGRES_USER:-shortlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortlink_dev_password}
    volumes:
      - shortlink_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7.4.1-alpine
    command: redis-server --appendonly yes
    volumes:
      - shortlink_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  mailpit:
    image: axllent/mailpit:v1.21.8
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:8025/ || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm run start:worker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_CONTAINER_PORT:-3000}
      API_CONTAINER_PORT: ${API_CONTAINER_PORT:-3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-jwt-access-secret-dev-only}
      AUTH_HMAC_SECRET: ${AUTH_HMAC_SECRET:-change-me-auth-hmac-secret-dev-only}
      AUTH_TOKEN_HASH_SECRET: ${AUTH_TOKEN_HASH_SECRET:-change-me-auth-token-hash-secret-dev-only}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://localhost:8443}
      FRONTEND_RESET_URL: ${FRONTEND_RESET_URL:-https://localhost:8443/reset-password}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      REFRESH_COOKIE_NAME: ${REFRESH_COOKIE_NAME:-shortlink_refresh}
      POSTGRES_DB: ${POSTGRES_DB:-shortlink}
      POSTGRES_USER: ${POSTGRES_USER:-shortlink}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortlink_dev_password}
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      MAILPIT_HOST: ${MAILPIT_HOST:-mailpit}
      MAILPIT_SMTP_PORT: ${MAILPIT_SMTP_PORT:-1025}
      MAIL_FROM: ${MAIL_FROM:-noreply@shortlink.local}
      EMAIL_QUEUE_ATTEMPTS: ${EMAIL_QUEUE_ATTEMPTS:-5}
      EMAIL_QUEUE_BACKOFF_MS: ${EMAIL_QUEUE_BACKOFF_MS:-2000}
      LINK_STATS_PSEUDONYM_SECRET: ${LINK_STATS_PSEUDONYM_SECRET:-change-me-link-stats-pseudonym-secret-dev-only}
      LINK_STATS_QUEUE_ATTEMPTS: ${LINK_STATS_QUEUE_ATTEMPTS:-5}
      LINK_STATS_QUEUE_BACKOFF_MS: ${LINK_STATS_QUEUE_BACKOFF_MS:-2000}
      GEOIP_COUNTRY_DB_PATH: ${GEOIP_COUNTRY_DB_PATH:-}
      PUBLIC_SHORT_URL_BASE: ${PUBLIC_SHORT_URL_BASE:-https://localhost:8443}
      LINK_CODE_GENERATION_MAX_ATTEMPTS: ${LINK_CODE_GENERATION_MAX_ATTEMPTS:-5}
      LINK_RESOLUTION_CACHE_TTL_SECONDS: ${LINK_RESOLUTION_CACHE_TTL_SECONDS:-300}
    volumes:
      - .:/app
      - /app/node_modules
      - ./data/geoip:/data/geoip:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

volumes:
  shortlink_postgres_data:
  shortlink_redis_data:
  shortlink_tls_certs:
